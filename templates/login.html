<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDX - Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #2563eb; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background:#f1f5f9; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
        .card { background:#fff; width:100%; max-width:480px; padding:45px; border-radius:35px; box-shadow:0 25px 50px rgba(0,0,0,0.1); text-align:center; }
        .logo { width:120px; height:120px; border-radius:30px; margin-bottom:25px; object-fit:cover; }
        h2 { font-size:34px; font-weight:900; color:#0f172a; margin-bottom:30px; }
        input { width:100%; padding:22px; margin-bottom:15px; border-radius:18px; border:2px solid #e2e8f0; font-size:20px; outline:none; background:#f8fafc; }
        .btn { width:100%; padding:22px; background:var(--p); color:#fff; border:none; border-radius:18px; font-weight:700; font-size:22px; cursor:pointer; }
        .links { margin-top:25px; display:flex; justify-content:space-between; font-size:18px; font-weight:600; }
        .links a { color:var(--p); text-decoration:none; }
        .footer { margin-top:40px; font-size:14px; color:#94a3b8; font-weight:800; letter-spacing:2px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/static/logo.png" class="logo">
        <h2>TDX MESSAGE</h2>
        <input type="email" id="e" placeholder="Email почта">
        <input type="password" id="p" placeholder="Пароль">
        <button class="btn" onclick="login()">Войти</button>
        <div class="links">
            <a href="/register">Регистрация</a>
            <a href="/reset_password">Забыли пароль?</a>
        </div>
        <div class="footer">TDX SYSTEM</div>
    </div>
    <script>
        async function login() {
            const res = await fetch('/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({login: document.getElementById('e').value, password: document.getElementById('p').value})
            });
            if(res.ok) window.location.href='/'; else alert("Ошибка входа!");
        }
    </script>
</body>
</html>
