<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDX v5.0</title>
    <style>
        :root { --p: #007aff; --bg: #ffffff; --sec: #f2f2f7; --border: #c6c6c8; --text-sec: #8e8e93; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; -webkit-tap-highlight-color: transparent; }

        /* СТРУКТУРА ПАНЕЛЕЙ */
        .sidebar, .settings-page { width: 350px; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; background: #fff; z-index: 10; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; transition: 0.3s; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sidebar, .settings-page { width: 100%; position: absolute; left: 0; height: 100%; }
            .chat-area { width: 100%; position: absolute; left: 100%; height: 100%; z-index: 20; }
            body.chat-active .chat-area { left: 0; }
        }

        /* ШАПКИ */
        .header { height: 50px; padding: 0 15px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #fff; }
        .back-btn { display: none; background: none; border: none; color: var(--p); font-size: 17px; cursor: pointer; }
        @media (max-width: 768px) { .back-btn { display: block; } }

        /* СООБЩЕНИЯ */
        #messages { flex: 1; overflow-y: auto; padding: 10px 15px 120px; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; }
        .bubble { max-width: 75%; padding: 8px 12px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .bubble.my { align-self: flex-end; background: var(--p); color: #fff; border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: #e5e5ea; color: #000; border-bottom-left-radius: 4px; }

        /* ВВОД СООБЩЕНИЯ (НАД ПАНЕЛЬЮ) */
        .input-wrap { 
            position: fixed; bottom: 50px; width: 100%; 
            padding: 8px 15px; background: #fff; border-top: 0.5px solid var(--border);
            display: flex; align-items: center; gap: 10px; z-index: 100;
        }
        .input-wrap input { flex:1; padding:10px 15px; border-radius:20px; border:none; background:var(--sec); outline:none; font-size:16px; }

        /* НИЖНЯЯ ПАНЕЛЬ (СТРОГО 50PX) */
        .nav-tabs { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .tab-item { text-decoration: none; color: var(--text-sec); display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; height: 100%; cursor: pointer; }
        .tab-item.active { color: var(--p); }
        .tab-icon { font-size: 22px; }
        .tab-label { font-size: 10px; margin-top: 1px; }

        /* СТИЛЬ НАСТРОЕК */
        .settings-content { padding: 20px; }
        .settings-group { background: var(--sec); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .settings-group label { display: flex; align-items: center; gap: 10px; font-size: 16px; margin-bottom: 10px; cursor: pointer; }
        .settings-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); margin-top: 5px; outline: none; }
    </style>
</head>
<body id="main-body">

    <div id="view-chats" class="sidebar">
        <div class="header"><h1 style="font-size:20px;">Чаты</h1> <span style="font-size:12px; color:var(--p)">{{ user.display_name }}</span></div>
        <div style="padding:10px;">
            <input type="text" id="uS" placeholder="Поиск..." oninput="search(this.value)" style="width:100%; padding:10px; border-radius:10px; border:none; background:var(--sec); outline:none;">
        </div>
        <div id="u-list" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="view-settings" class="settings-page hidden">
        <div class="header"><h1 style="font-size:20px;">Настройки</h1></div>
        <div class="settings-content">
            <div class="settings-group">
                <p style="font-size: 14px; color: var(--text-sec); margin-bottom: 10px;">Двухфакторная аутентификация</p>
                <label>
                    <input type="checkbox" id="2fa-check" {{ 'checked' if user.2fa_enabled else '' }}>
                    Включить вход по паролю
                </label>
                <input type="password" id="2fa-pass" class="settings-input" placeholder="Задать секретный пароль" value="{{ user.2fa_password or '' }}">
                <button onclick="save2FA()" style="margin-top:15px; width: 100%; background: var(--p); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: 600;">Сохранить изменения</button>
            </div>
            
            <button onclick="location.href='/logout'" style="width: 100%; padding: 12px; background: #ff3b30; color: #fff; border: none; border-radius: 10px; font-weight: 600;">Выйти из аккаунта</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="header">
            <button class="back-btn" onclick="closeChat()">‹ Назад</button>
            <b id="c-name">Выберите чат</b>
            <div style="width:30px;"></div>
        </div>
        <div id="messages"></div>
        <div class="input-wrap">
            <input type="text" id="mIn" placeholder="Cообщение..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="border:none; background:none; font-size:24px; color:var(--p);">🏹</button>
        </div>
    </div>

    <nav class="nav-tabs">
        <div class="tab-item active" onclick="switchTab('chats', this)">
            <span class="tab-icon">💬</span>
            <span class="tab-label">Чаты</span>
        </div>
        <div class="tab-item" onclick="location.href='/profile'">
            <span class="tab-icon">👤</span>
            <span class="tab-label">Профиль</span>
        </div>
        <div class="tab-item" onclick="switchTab('settings', this)">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label">Настройки</span>
        </div>
    </nav>

    <script>
        let curT = "";
        let itv = null;
        const myN = "{{ user.display_name }}";

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if(tab === 'chats') {
                document.getElementById('view-chats').classList.remove('hidden');
                document.getElementById('view-settings').classList.add('hidden');
            } else {
                document.getElementById('view-chats').classList.add('hidden');
                document.getElementById('view-settings').classList.remove('hidden');
            }
        }

        async function save2FA() {
            const enabled = document.getElementById('2fa-check').checked;
            const password = document.getElementById('2fa-pass').value;
            if(enabled && !password) return alert("Введите секретный пароль!");

            const r = await fetch('/toggle_2fa', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({enabled, password})
            });
            if(r.ok) alert("Настройки безопасности обновлены!");
        }

        async function search(q) {
            if(!q) { document.getElementById('u-list').innerHTML = ""; return; }
            const r = await fetch('/search_user', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:q})});
            const d = await r.json();
            document.getElementById('u-list').innerHTML = d.map(u => `
                <div style="padding:15px; border-bottom:0.5px solid #eee; cursor:pointer;" onclick="openChat('${u}')">
                    <b>${u}</b>
                </div>`).join('');
        }

        function openChat(u) {
            curT = u; document.getElementById('main-body').classList.add('chat-active');
            document.getElementById('c-name').innerText = u;
            loadM(); if(itv) clearInterval(itv); itv = setInterval(loadM, 2000);
        }

        function closeChat() { document.getElementById('main-body').classList.remove('chat-active'); clearInterval(itv); }

        async function loadM() {
            if(!curT) return;
            const r = await fetch('/get_chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({target:curT})});
            const d = await r.json();
            const box = document.getElementById('messages');
            box.innerHTML = d.messages.map(m => `<div class="bubble ${m.sender === myN ? 'my' : 'other'}">${m.text}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('mIn');
            if(!i.value || !curT) return;
            await fetch('/send_message', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({target:curT, text:i.value})});
            i.value = ""; loadM();
        }
    </script>
</body>
</html>
